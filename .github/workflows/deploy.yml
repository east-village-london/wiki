name: Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 clones the full git history rather than just the latest
          # commit. Required for any feature that reads commit dates (e.g. "last
          # modified" timestamps on pages).
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install zensical
      - run: zensical build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
